name: Publish urunan.html to GitHub Pages

# Copies urunan.html from main to the gh-pages branch as index.html.
# GitHub Pages serves the site from gh-pages (the github-pages
# environment only allows deployments from that branch), and its
# built-in "pages build and deployment" workflow publishes the push.

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths: [ "urunan.html" ]

permissions:
  contents: write

concurrency:
  group: publish-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: main

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site

      - name: sync and push
        run: |
          cp main/urunan.html site/index.html
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes to publish" && exit 0
          git commit -m "Publish urunan.html from main @ ${GITHUB_SHA::7}"
          git push
